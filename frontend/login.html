<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sava Voyages - Connexion Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light">
  <div class="d-flex align-items-center justify-content-center min-vh-70 py-5 px-3">
    <div class="card shadow-sm border-0 fade-in" style="width:100%; max-width:400px;">
      <div class="card-body p-4 text-center">
        <h2 class="card-title font-display" style="font-family:var(--font-display); font-size:1.8rem; margin-bottom:6px;">Connexion Admin</h2>
        <p class="text-muted mb-4" style="font-size:0.95rem;">Accédez à votre tableau de bord</p>
        
        <div id="loginAlert"></div>
        
        <form id="loginForm">
          <div class="mb-3 text-start">
            <label for="username" class="form-label fw-semibold text-muted small">Nom d'utilisateur</label>
            <input type="text" class="form-control" id="username" placeholder="admin" required>
          </div>
          <div class="mb-3 text-start">
            <label for="password" class="form-label fw-semibold text-muted small">Mot de passe</label>
            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary w-100" id="loginBtn">
            Se connecter
          </button>
        </form>
        
        <p class="mt-4 mb-0 small text-muted">
          <a href="/" style="color:var(--primary-light); text-decoration:none;">Retour à l'accueil</a>
        </p>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
