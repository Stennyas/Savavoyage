<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sava Voyages - Connexion Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="card login-card fade-in">
      <h2>Connexion Admin</h2>
      <p class="subtitle">Accédez à votre tableau de bord</p>
      
      <div id="loginAlert"></div>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Nom d'utilisateur</label>
          <input type="text" class="form-control" id="username" placeholder="admin" required>
        </div>
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" class="form-control" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
          Se connecter
        </button>
      </form>
      
      <p style="text-align:center; margin-top:20px; font-size:0.8rem; color:var(--text-muted);">
        <a href="/" style="color:var(--primary-light);">Retour à l'accueil</a>
      </p>
    </div>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
